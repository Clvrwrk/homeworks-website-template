# Nixpacks build configuration for Coolify + Hostinger KVM VPS
# Coolify picks this up automatically — no Dockerfile required.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --prefer-offline"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[variables]
NODE_ENV = "production"
